name: gprMax CI/CD Trident Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Ye permission GitHub ko batati hai ki use GHCR mein "Likhne" ka haq hai
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Yahan ${{ secrets.GITHUB_TOKEN }} apne aap kaam karega, kuch generate mat karna
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Docker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Run Simulation and Generate HDF5
        run: |
          # Pehle results folder banao taaki mount fail na ho
          mkdir -p ${{ github.workspace }}/results
          
          # GHCR se wahi image pull karo jo abhi push hui hai
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          
          # Volume mount logic: Container ka data local 'results' mein aa jayega
          docker run -v ${{ github.workspace }}/results:/app/results ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
