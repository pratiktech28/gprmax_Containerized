name: gprMax CI/CD Trident Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# GitHub ko packages likhne ki permission dena zaroori hai
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Docker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Run Simulation with Trident Debugging
        run: |
          # 1. Results folder banana taaki HDF5 save ho sake
          mkdir -p ${{ github.workspace }}/results
          
          # 2. Jo image abhi build hui hai usey pull karo
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          
          # 3. FINAL EXECUTION: Absolute path mapping ke saath simulation run
          # Yahan 'user_models/test.in' ki jagah apni .in file ka naam confirm kar lena
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            python3 -m gprMax user_models/test.in -n 1
          
          # 4. Verification: Check karo results folder mein output aaya ya nahi
          echo "Listing results after simulation..."
          ls -R ${{ github.workspace }}/results
