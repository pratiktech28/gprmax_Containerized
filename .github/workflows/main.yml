name: gprMax CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # Step 1: Docker Image Build karna (Wahi Dockerfile jo humne banayi)
    - name: Build Docker Image
      run: |
        docker build -t gprmax-automation -f docker/Dockerfile .

    # Step 2: Container Run karke Python Script chalana
    - name: Run Physics & Geometry Validation
      run: |
        docker run gprmax-automation python scripts/integration_test.py